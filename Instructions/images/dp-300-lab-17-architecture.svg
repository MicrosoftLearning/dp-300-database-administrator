<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="Solution architecture diagram for the Contoso Retail recommendation system">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5a5a5a"/>
    </marker>
    <style>
      .box { fill:#eef3fb; stroke:#2f6fb0; stroke-width:1.5; rx:8; }
      .etl { fill:#e7f4ec; stroke:#2e7d46; stroke-width:1.5; }
      .lake { fill:#fdf3e3; stroke:#c77d10; stroke-width:1.5; }
      .ml { fill:#f0eaf8; stroke:#6b3fa0; stroke-width:1.5; }
      .endpoint { fill:#fce9ec; stroke:#b3324a; stroke-width:1.5; }
      .title { font-size:13px; font-weight:bold; fill:#1b1b1b; }
      .sub { font-size:11px; fill:#444; }
      .edge { stroke:#5a5a5a; stroke-width:1.5; fill:none; }
    </style>
  </defs>

  <!-- Sources -->
  <g>
    <rect class="box" x="20" y="20" width="180" height="56" rx="8"/>
    <text class="title" x="110" y="44" text-anchor="middle">Azure SQL Database</text>
    <text class="sub" x="110" y="62" text-anchor="middle">Transactional data</text>

    <rect class="box" x="20" y="106" width="180" height="56" rx="8"/>
    <text class="title" x="110" y="130" text-anchor="middle">Blob Storage</text>
    <text class="sub" x="110" y="148" text-anchor="middle">JSON clickstream</text>

    <rect class="box" x="20" y="192" width="180" height="56" rx="8"/>
    <text class="title" x="110" y="216" text-anchor="middle">Blob Storage</text>
    <text class="sub" x="110" y="234" text-anchor="middle">Product images</text>

    <rect class="box" x="20" y="278" width="180" height="56" rx="8"/>
    <text class="title" x="110" y="302" text-anchor="middle">Dynamics 365</text>
    <text class="sub" x="110" y="320" text-anchor="middle">Customer profiles (CRM)</text>
  </g>

  <!-- ETL -->
  <rect class="etl" x="290" y="148" width="170" height="60" rx="8"/>
  <text class="title" x="375" y="172" text-anchor="middle">ETL pipeline</text>
  <text class="sub" x="375" y="190" text-anchor="middle">Azure Synapse Analytics</text>

  <!-- Data Lake -->
  <rect class="lake" x="510" y="148" width="170" height="60" rx="8"/>
  <text class="title" x="595" y="172" text-anchor="middle">Data Lake Storage</text>
  <text class="sub" x="595" y="190" text-anchor="middle">Unified training data</text>

  <!-- Azure ML -->
  <rect class="ml" x="730" y="148" width="180" height="60" rx="8"/>
  <text class="title" x="820" y="172" text-anchor="middle">Azure Machine Learning</text>
  <text class="sub" x="820" y="190" text-anchor="middle">Model training</text>

  <!-- Endpoints -->
  <rect class="endpoint" x="730" y="40" width="180" height="58" rx="8"/>
  <text class="title" x="820" y="64" text-anchor="middle">Real-time endpoint</text>
  <text class="sub" x="820" y="82" text-anchor="middle">Mobile app</text>

  <rect class="endpoint" x="730" y="262" width="180" height="58" rx="8"/>
  <text class="title" x="820" y="286" text-anchor="middle">Batch endpoint</text>
  <text class="sub" x="820" y="304" text-anchor="middle">Weekly email campaign</text>

  <!-- Edges: sources -> ETL -->
  <path class="edge" marker-end="url(#arrow)" d="M200,48 C250,48 255,168 288,176"/>
  <path class="edge" marker-end="url(#arrow)" d="M200,134 C245,134 255,172 288,178"/>
  <path class="edge" marker-end="url(#arrow)" d="M200,220 C245,220 255,184 288,180"/>
  <path class="edge" marker-end="url(#arrow)" d="M200,306 C250,306 255,188 288,182"/>

  <!-- ETL -> Lake -->
  <path class="edge" marker-end="url(#arrow)" d="M460,178 L508,178"/>
  <!-- Lake -> ML -->
  <path class="edge" marker-end="url(#arrow)" d="M680,178 L728,178"/>
  <!-- ML -> Real-time -->
  <path class="edge" marker-end="url(#arrow)" d="M820,148 L820,100"/>
  <!-- ML -> Batch -->
  <path class="edge" marker-end="url(#arrow)" d="M820,208 L820,260"/>
</svg>
